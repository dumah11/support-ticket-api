name: Support Ticket API CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: support_user
          POSTGRES_PASSWORD: support_password
          POSTGRES_DB: support_tickets

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U support_user -d support_tickets"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test application imports
        env:
          DATABASE_URL: postgresql://support_user:support_password@localhost:5432/support_tickets
        run: |
          python -c "from app.api import app; print('Application imported successfully!')"